spring:
  application:
    name: url-shortener-spring-boot

  datasource:
    url: jdbc:postgresql://localhost:5432/urlshortener
    username: dev
    password: qwerty
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 20

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2
          max-wait: 1000ms

url-shortener:
  base-url: http://localhost:8080
  cache-ttl-hours: 24

server:
  port: 8080

logging:
  level:
    com.boottechsolutions: INFO
    org.springframework.data.redis: WARN
